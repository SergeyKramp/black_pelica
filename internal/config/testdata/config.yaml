# PostgreSQL database configuration
database:
  url: postgres://user:pass@localhost:5432/ces?sslmode=disable
  pool:
    max_conns: 10
    min_conns: 2

# Kafka configuration
kafka:
  brokers:
    - localhost:9092
  vouchers:
    topic: Hema.Loyalty.Voucher
    consumer_group: ces-voucher-reminders

# Selligent API configuration
selligent:
  base_url: https://api.selligent.example.com
  api_key: test-api-key

# Voucher reminder scheduler configurations
scheduler:
  interval_seconds: 3600
  worker_count: 5
  batch_size: 100
